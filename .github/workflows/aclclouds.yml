name: 🤖 ACLClouds Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '21 15 19 5 *' # 下一个: 2026-05-19 15:21 UTC (到期前2天执行)

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: write

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          path: .
          # 使用你添加的 REPO_TOKEN 来获取修改工作流文件的权限
          token: ${{ secrets.REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装 Playwright 依赖与浏览器
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: 🛡️ 安装并启动代理
        env:
          Aclclouds_PROXY_NODE: ${{ secrets.Aclclouds_PROXY_NODE }}
        run: |
          if [ -z "$Aclclouds_PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          python3 << 'PYEOF'
          import os
          import sys
          import json
          import base64
          from urllib.parse import parse_qs, unquote

          def mask(value):
              return f"{value[:2]}***{value[-2:]}" if len(value) > 4 else "****"

          url = os.environ.get("Aclclouds_PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] Aclclouds_PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              content = url.split("://", 1)[1].split("#", 1)[0]
              if "@" in content:
                  server = content.split("@", 1)[1].split(":", 1)[0]
              else:
                  server = content.split(":", 1)[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w", encoding="utf-8") as handle:
                  handle.write(url.split("#", 1)[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://', 1)[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }

              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow

              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk
                  }
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": service_name
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vmess = json.loads(decoded)
              except Exception as exc:
                  print(f"[ERROR] VMess 解析失败: {exc}")
                  sys.exit(1)

              address = vmess.get("add", "")
              port = int(vmess.get("port", 443))
              uuid = vmess.get("id", "")
              aid = int(vmess.get("aid", 0))
              network = vmess.get("net", "tcp")
              tls = vmess.get("tls", "")
              sni = vmess.get("sni", "") or vmess.get("host", address)
              host = vmess.get("host", address)
              path = vmess.get("path", "/")
              fp = vmess.get("fp", "chrome")

              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none"
                  }
              }

              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]

              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")

              outbound = {
                  "protocol": "trojan",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "password": password
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls",
                      "tlsSettings": {
                          "serverName": sni,
                          "fingerprint": fp,
                          "allowInsecure": False
                      }
                  }
              }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as exc:
                  print(f"[ERROR] Shadowsocks 解析失败: {exc}")
                  sys.exit(1)

              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")

              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "method": method,
                          "password": password
                      }]
                  }
              }

              config["outbounds"].append(outbound)

          with open("xray_config.json", "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)

          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: 🚀 运行 ACLClouds Python 脚本
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          Aclclouds_PROXY_NODE: ${{ env.PROXY_SERVER }}
        run: |
          python aclclouds.py

      - name: 自动修改下一次运行时间
        env:
          # 推送时也调用你的 REPO_TOKEN
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          WORKFLOW_FILE: .github/workflows/aclclouds.yml # ⚠️ 注意：如果你实际的 yml 文件名不是 aclclouds.yml，请在这里修改为你真实的文件路径！
        run: |
          python3 << 'EOF'
          import re
          import os
          from datetime import datetime, timedelta

          workflow_file = os.environ.get("WORKFLOW_FILE")
          date_file = 'next_time.txt'
          
          # 使用 UTC 时间作为基准计算 cron
          now_utc = datetime.utcnow()
          target_date = None
          
          if os.path.exists(date_file):
              with open(date_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # 匹配类似于 "9j 22h" 或 "9d 23h" 的时间格式
              match = re.search(r'(\d+)\s*[dj]\s*(\d+)\s*h', content, re.IGNORECASE)
              if match:
                  days = int(match.group(1))
                  hours = int(match.group(2))
                  
                  # 计算面板上的实际到期时间
                  expire_time = now_utc + timedelta(days=days, hours=hours)
                  
                  # 目标运行时间设定为：到期前 2 天
                  target_date = expire_time - timedelta(days=2)

          if target_date and target_date > now_utc:
              cron_month = target_date.month
              cron_day = target_date.day
              cron_hour = target_date.hour
              cron_minute = target_date.minute
              
              next_date_str = f"{target_date.strftime('%Y-%m-%d %H:%M')} UTC (到期前2天执行)"
              new_cron = f"{cron_minute} {cron_hour} {cron_day} {cron_month} *"
          else:
              # 如果解析失败或时间已过，使用兜底方案：明天同一时间重试
              tomorrow_utc = now_utc + timedelta(days=1)
              new_cron = f"{tomorrow_utc.minute} {tomorrow_utc.hour} * * *"
              next_date_str = f"{tomorrow_utc.strftime('%Y-%m-%d %H:%M')} UTC (兜底方案)"

          try:
              with open(workflow_file, 'r', encoding='utf-8') as f:
                  content = f.read()

              # 替换 cron 表达式
              new_content = re.sub(
                  r"- cron: '.*?'.*",
                  f"- cron: '{new_cron}' # 下一个: {next_date_str}",
                  content,
                  count=1
              )

              with open(workflow_file, 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f"✅ 已精准将下一次运行时间更新为: {new_cron} (目标时间: {next_date_str})")
          except Exception as e:
              print(f"❌ 修改 yml 文件失败: {e}")
              exit(1)
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $WORKFLOW_FILE
          git commit -m "🚀 auto: 精准锁定到期前两天执行续期" || echo "没有变更需要提交"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push

      - name: 🧹 清理旧的运行记录 (仅保留最近 5 个)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
